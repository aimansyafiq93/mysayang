<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Surat Cinta ❤️</title>

<!-- 🌸 FONT ROMANTIC -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: url('sayang1.html') no-repeat center center fixed;
    background-size: cover;

    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    color: white;
}

/* gelapkan background */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.55);
}

/* 💖 CARD GLASS EFFECT */
.card {
    position: relative;
    background: rgba(0,0,0,0.55);
    padding: 35px 30px;
    border-radius: 25px;
    text-align: center;
    max-width: 420px;

    backdrop-filter: blur(0px);
    box-shadow: 0 15px 50px rgba(0,0,0,0.5);

    animation: pop 1s ease;
}

/* TITLE ROMANTIC */
h1 {
    font-family: 'Dancing Script', cursive;
    font-size: 40px;
    margin-bottom: 15px;
    color: #ffb6c1;
}

/* TEXT SOFT */
p {
    font-size: 16px;
    line-height: 1.7;
    font-weight: 300;
}

/* HEART ANIMATION */
.heart {
    font-size: 60px;
    animation: beat 1s infinite;
    margin-bottom: 10px;
}

@keyframes beat {
    0% {transform: scale(1);}
    50% {transform: scale(1.3);}
    100% {transform: scale(1);}
}

/* BUTTON CANTIK */
button {
    margin-top: 18px;
    padding: 12px 30px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(135deg, #ff4d6d, #ff758c);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 15px rgba(255,77,109,0.5);
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px rgba(255,77,109,0.8);
}

/* POP ANIMATION */
@keyframes pop {
    from {transform: scale(0.7); opacity: 0;}
    to {transform: scale(1); opacity: 1;}
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="card">

    <div class="heart">❤️</div>

    <h1>Untuk Sayang Baby >.<</h1>

    <p>
        Baby minta maaf sangat tau 🥹<br>
        Baby tidur mati semalam tak sedar apa pun…<br>
        Janji lepas ni tak tinggal awak sorang dah 🥺🤍<br>
        iloveyouuuusayangggg 🤍🤍🤍
    </p>

    <button onclick="startLove()">Cuba tekan ni sayang 💖</button>

</div>

<!-- MUSIC -->
<audio id="music" src="love.mp3"></audio>

<script>
function startLove() {
    document.getElementById("music").play();
    startConfetti();
}

/* CONFETTI */
function startConfetti() {
    for (let i = 0; i < 60; i++) {
        let conf = document.createElement("div");
        conf.innerHTML = "💖";
        conf.style.position = "absolute";
        conf.style.left = Math.random() * 100 + "vw";
        conf.style.top = "-10px";
        conf.style.fontSize = Math.random() * 25 + 10 + "px";
        conf.style.animation = "fall 4s linear forwards";
        document.body.appendChild(conf);
    }
}

const style = document.createElement("style");
style.innerHTML = `
@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
    }
}`;
document.head.appendChild(style);
</script>

</body>
</html>
