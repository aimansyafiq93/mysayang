<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Untuk Sayang ❤️</title>

<!-- 🌸 FONT ROMANTIC -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: url('sayang1.html') no-repeat center center fixed;
    background-size: cover;

    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    color: white;
}

/* DARK OVERLAY */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.55);
}

/* 💖 CARD LEBIH SOFT & GLASS EFFECT */
.card {
    position: relative;
    background: rgba(0,0,0,0.45);
    padding: 35px;
    border-radius: 25px;
    text-align: center;
    max-width: 420px;

    backdrop-filter: blur(0px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);

    animation: fadeIn 1.5s ease;
}

/* TITLE ROMANTIC */
h1 {
    font-family: 'Dancing Script', cursive;
    font-size: 40px;
    margin-bottom: 10px;
    color: #ffb6c1;
}

/* TEXT SOFT */
p {
    font-size: 16px;
    font-weight: 300;
    line-height: 1.6;
}

/* BUTTON CANTIK GLOW */
button {
    margin-top: 18px;
    padding: 12px 28px;
    border: none;
    border-radius: 30px;

    background: linear-gradient(135deg, #ff4d6d, #ff758c);
    color: white;
    font-size: 15px;
    cursor: pointer;

    transition: 0.3s;
    box-shadow: 0 0 15px rgba(255,77,109,0.5);
}

/* hover effect */
button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px rgba(255,77,109,0.8);
}

/* FADE IN ANIMATION */
@keyframes fadeIn {
    from {opacity: 0; transform: scale(0.8);}
    to {opacity: 1; transform: scale(1);}
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="card">

    <h1>Hai Sayang ❤️</h1>

    <p>
        Baby ada something ni untuk sayang 🥺🤍
    </p>

    <a href="myprincess3.html">
        <button>Tekan sini 💌</button>
    </a>

</div>

</body>
</html>
