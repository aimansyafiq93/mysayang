<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Untuk Sayang ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: url('sayang1.html') no-repeat center center fixed;
    background-size: cover;

    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    color: white;
}

/* overlay gelap */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.55);
}

/* 💖 CARD UPGRADE */
.card {
    position: relative;
    background: rgba(0,0,0,0.5);
    padding: 40px 30px;
    border-radius: 28px;
    text-align: center;
    max-width: 380px;

    backdrop-filter: blur(0px);
    box-shadow: 0 15px 50px rgba(0,0,0,0.6);

    animation: fadeIn 1.2s ease;
}

/* TITLE LAGI ROMANTIC */
h1 {
    font-family: 'Dancing Script', cursive;
    font-size: 42px;
    margin-bottom: 15px;
    color: #ffb6c1;
}

/* IMAGE CANTIK */
img {
    width: 180px;
    height: 180px;
    object-fit: cover;

    border-radius: 20px;
    margin: 10px 0;

    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    transition: 0.3s;
}

img:hover {
    transform: scale(1.05);
}

/* BUTTON LEBIH GLOW */
button {
    margin-top: 15px;
    padding: 12px 28px;
    border: none;
    border-radius: 30px;

    background: linear-gradient(135deg, #ff4d6d, #ff758c);
    color: white;
    font-size: 15px;
    cursor: pointer;

    transition: 0.3s;
    box-shadow: 0 0 15px rgba(255,77,109,0.5);
}

button:hover {
    transform: scale(1.08);
    box-shadow: 0 0 25px rgba(255,77,109,0.8);
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity: 0; transform: scale(0.85);}
    to {opacity: 1; transform: scale(1);}
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="card">

    <h1>Cakkkk!!! hehe ❤️</h1>

    <!-- FIXED IMAGE -->
    <img src="sayang3.html" alt="love">

    <br>

    <a href="myprincess2.html">
        <button>Tekan ni sayang 💌</button>
    </a>

</div>

</body>
</html>
